name: Deploy Weather Bot to AWS

on:
  push:
    branches:
      - main  # 当代码推送到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/comp7940-GP
            git pull origin main
            # 停止并移除旧容器（如果存在）
            docker stop my-weather-bot || true
            docker rm my-weather-bot || true
            # 重新构建镜像并启动（目前先用 docker build，后续我们会升级为 docker-compose）
            docker build -t my-weather-bot .
            docker run -d --name my-weather-bot \
              -v $(pwd)/config.ini:/app/config.ini \
              --restart always \
              my-weather-bot